name: VoltSentinel CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Nightly
        run: rustup default nightly
      - name: Run Tests
        run: cd battery-ingestor && cargo test
      - name: Check Build
        run: cd battery-ingestor && cargo build --release

deploy:
  needs: test # Only run if tests pass!
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - name: Build and Push Ingestor
      run: |
        docker build -t your-username/volt-ingestor:latest ./battery-ingestor
        docker push your-username/volt-ingestor:latest
